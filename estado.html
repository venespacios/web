<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patrimonio Venezuela — Estado</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ─── HEADER ─────────────────────────────────────────────── -->
  <header>
    <div class="nav-container">
      <a href="index.html"><img src="logo.png" alt="Patrimonio" class="nav-logo-img"></a>
      <nav id="mainNav">
        <a href="index.html">Inicio</a>
        <a href="index.html#mapa">Mapa</a>
        <a href="index.html#galeria">Galería</a>
      </nav>
    </div>
    <div class="header-right">
      <button class="btn-header" onclick="location.href='index.html'">Volver</button>
      <button class="nav-toggle" id="navToggle" aria-label="Abrir menú" onclick="toggleNav()">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <!-- ─── DYNAMIC CONTENT ──────────────────────────────────────── -->
  <main id="estadoContent">
    <!-- Populated by JS -->
  </main>

  <!-- ─── FOOTER ───────────────────────────────────────────────── -->
  <footer>
    <span>© 2025 Patrimonio Venezuela — Proyecto universitario · Materia: Cultura</span>
    <span>24 estados · Venezuela</span>
  </footer>

  <script src="script.js"></script>
  <script>
    // ── Read URL param and render state page ───────────────────
    const params  = new URLSearchParams(window.location.search);
    const estadoId = params.get('estado');
    const content  = document.getElementById('estadoContent');

    if (estadoId && DATA[estadoId]) {
      const estado = DATA[estadoId];
      const count  = estado.lugares.length;

      // Update <title>
      document.title = `${estado.nombre} — Patrimonio Venezuela`;

      // Render header
      const headerEl = document.createElement('div');
      headerEl.className = 'estado-header';
      headerEl.innerHTML = `
        <a class="back-link" href="index.html">Volver al mapa</a>
        <h1>${estado.nombre}</h1>
        <div class="estado-meta">
          <span>🏙 Capital: ${estado.capital}</span>
          <span>📍 Región: ${estado.region}</span>
          <span>🏛 ${count} lugar${count !== 1 ? 'es' : ''} patrimonial${count !== 1 ? 'es' : ''}</span>
        </div>
      `;
      content.appendChild(headerEl);

      // Render places grid
      const gridEl = document.createElement('div');
      gridEl.className = 'estado-places';

      function slugify(str) {
        return str.toLowerCase()
          .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
          .replace(/[^a-z0-9\s-]/g, '')
          .trim().replace(/\s+/g, '-');
      }

      estado.lugares.forEach(lugar => {
        const card = document.createElement('div');
        card.className = 'place-card';
        card.style.cursor = 'pointer';
        card.onclick = () => location.href = `lugar.html?estado=${estadoId}&lugar=${slugify(lugar.n)}`;
        const icons = {Natural:'🌿',Histórico:'🏛',Cultural:'🎭',Religioso:'⛪',UNESCO:'🏆',Patrimonio:'🗼'};
        const thumbHTML = lugar.img
          ? `<div class="place-card-thumb"><img src="${lugar.img}" alt="${lugar.n}"></div>`
          : `<div class="place-card-thumb place-card-thumb--icon"><span style="font-size:2rem;opacity:.4">${icons[lugar.cat]||'📍'}</span></div>`;
        card.innerHTML = `
          ${thumbHTML}
          <span class="place-badge badge-${lugar.cat}">${lugar.cat}</span>
          <h3>${lugar.n}</h3>
          <p>${lugar.d}</p>
          <span class="place-card-link">Ver más →</span>
        `;
        gridEl.appendChild(card);
      });

      content.appendChild(gridEl);

    } else {
      // No state found
      content.innerHTML = `
        <div class="no-state">
          <h2>Estado no encontrado</h2>
          <p>El estado que buscas no existe en nuestra base de datos.</p>
          <button class="btn-primary" onclick="location.href='index.html'">← Volver al inicio</button>
        </div>
      `;
    }
  </script>
</body>
</html>
